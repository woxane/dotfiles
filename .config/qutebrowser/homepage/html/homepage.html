    <div id="search">

        <div class="bookmark-container">

                <div class="bookmark-title">School</div>
                <div class="bookmark-inner-container">
		    <a class="bookmark" href="https://pomofocus.io/">Pomofocus</a>

            </div>
            <div class="bookmark-set">
                <div class="bookmark-title">Social & Video</div>
                <div class="bookmark-inner-container">
          	    <i class="fa-solid fa-thumbs-up fa-5x"></i>
                    <a class="bookmark" href="https://youtube.com/" >Youtube</a>
		    <a class="bookmark" href="https://reddit.com">Reddit</a>
		    <a class='bookmark' href='https://sermovie.me/'>Sermovie</a>
		    <a class='bookmark' href='https://nyaa.si/'>Nyaa</a>
                    <a class="bookmark" href="https://psa.one/" >PSA</a>

                </div>
            </div>
            <div class="bookmark-set">
                <div class="bookmark-title">Linux</div>
                <div class="bookmark-inner-container">
		    <a class='bookmark' href='https://virgool.io/'>Virgool</a>
                    <a class="bookmark" href="https://www.linuxtoday.com/" >LinuxToday</a>
                    <a class="bookmark" href="https://www.linuxinsider.com/" >LinuxInsider</a>
                    <a class="bookmark" href="https://phoronix.com/" >Phoronix</a>
                    <a class="bookmark" href="https://www.zdnet.com/topic/linux/" >ZDNet</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Search on enter key event
        getTime = () => {
            let date = new Date(),
                min = date.getMinutes(),
                sec = date.getSeconds(),
                hour = date.getHours();

            return "" +
                (hour < 10 ? ("0" + hour) : hour) + ":" +
                (min < 10 ? ("0" + min) : min) + ":" +
                (sec < 10 ? ("0" + sec) : sec);
        }

        window.onload = () => {
            let xhr = new XMLHttpRequest();
            // Set up the clock
            document.getElementById("clock").innerHTML = getTime();
            // Set clock interval to tick clock
            setInterval( () => {
                document.getElementById("clock").innerHTML = getTime();
            },100);
        }

    </script>
</body>
</html>
